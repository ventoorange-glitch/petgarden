<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" width="120" height="36">
  <!-- Orange "V" mark -->
  <g>
    <!-- Stylized V shape as two angled bars -->
    <rect x="0" y="2" width="7" height="24" rx="3.5" fill="#FF6B1A" transform="rotate(18 6 14)"/>
    <rect x="13" y="2" width="7" height="24" rx="3.5" fill="#FF6B1A" transform="rotate(-18 16 14)"/>
  </g>
  <!-- "vento orange" wordmark -->
  <text x="34" y="14"
        font-family="Arial Black, sans-serif"
        font-weight="900"
        font-size="11"
        fill="#FF6B1A"
        letter-spacing="0.5">VENTO</text>
  <text x="34" y="28"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="600"
        font-size="9"
        fill="#FF6B1A"
        letter-spacing="2">ORANGE</text>
</svg>
