<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <clipPath id="inner-clip">
      <circle cx="130" cy="130" r="116"/>
    </clipPath>
  </defs>

  <!-- Outer navy ring -->
  <circle cx="130" cy="130" r="128" fill="#0d1f6e"/>
  <!-- White body -->
  <circle cx="130" cy="130" r="124" fill="#ffffff"/>
  <!-- Thin inner ring -->
  <circle cx="130" cy="130" r="119" fill="none" stroke="#0d1f6e" stroke-width="1.2"/>

  <!-- ── LEAVES ARC at top ── -->
  <!-- Far left leaf -->
  <ellipse cx="58"  cy="68"  rx="6.5" ry="14" fill="#43A047" transform="rotate(-55 58 68)"/>
  <!-- Left leaf -->
  <ellipse cx="78"  cy="45"  rx="6.5" ry="14" fill="#43A047" transform="rotate(-30 78 45)"/>
  <!-- Left-center leaf -->
  <ellipse cx="104" cy="30"  rx="6.5" ry="14" fill="#43A047" transform="rotate(-12 104 30)"/>
  <!-- Top center leaf -->
  <ellipse cx="130" cy="24"  rx="6.5" ry="14" fill="#43A047" transform="rotate(0 130 24)"/>
  <!-- Right-center leaf -->
  <ellipse cx="156" cy="30"  rx="6.5" ry="14" fill="#43A047" transform="rotate(12 156 30)"/>
  <!-- Right leaf -->
  <ellipse cx="182" cy="45"  rx="6.5" ry="14" fill="#43A047" transform="rotate(30 182 45)"/>
  <!-- Far right leaf -->
  <ellipse cx="202" cy="68"  rx="6.5" ry="14" fill="#43A047" transform="rotate(55 202 68)"/>

  <!-- ── DOG silhouette (left, facing right) ── -->
  <g fill="#1565C0" clip-path="url(#inner-clip)">
    <!-- Body -->
    <ellipse cx="90" cy="115" rx="26" ry="21"/>
    <!-- Head -->
    <circle cx="78"  cy="91"  r="17"/>
    <!-- Floppy ear (left ear, hanging) -->
    <ellipse cx="63" cy="97" rx="10" ry="16" transform="rotate(-15 63 97)"/>
    <!-- Snout -->
    <ellipse cx="60" cy="97" rx="11" ry="8"/>
    <!-- Nose -->
    <circle cx="51" cy="95" r="4" fill="#0a185a"/>
    <!-- Eye -->
    <circle cx="73" cy="86" r="3" fill="#0a185a"/>
    <!-- Front leg -->
    <rect x="70"  y="130" width="11" height="20" rx="5.5"/>
    <!-- Back leg -->
    <rect x="91"  y="130" width="11" height="20" rx="5.5"/>
    <!-- Tail: sweeping up toward center-top -->
    <path d="M116 108 Q138 86 132 68" stroke="#1565C0" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── CAT silhouette (right, facing left) ── -->
  <g fill="#1565C0" clip-path="url(#inner-clip)">
    <!-- Body -->
    <ellipse cx="170" cy="115" rx="24" ry="21"/>
    <!-- Head -->
    <circle cx="182" cy="91"  r="16"/>
    <!-- Pointed ears -->
    <polygon points="173,80 168,61 183,76"/>
    <polygon points="191,80 196,61 183,76"/>
    <!-- Snout -->
    <ellipse cx="196" cy="96" rx="10" ry="7"/>
    <!-- Nose -->
    <circle cx="204" cy="94" r="3.5" fill="#0a185a"/>
    <!-- Eye -->
    <circle cx="187" cy="86" r="3" fill="#0a185a"/>
    <!-- Front leg -->
    <rect x="160" y="130" width="11" height="20" rx="5.5"/>
    <!-- Back leg -->
    <rect x="176" y="130" width="11" height="20" rx="5.5"/>
    <!-- Tail: curves down, under, and up toward center -->
    <path d="M146 118 Q126 134 124 116 Q122 98 132 88" stroke="#1565C0" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ── TEXT ── -->
  <!-- PET GARDEN -->
  <text x="130" y="166"
        text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-weight="900"
        font-size="23"
        fill="#1565C0"
        letter-spacing="1.5">PET GARDEN</text>

  <!-- Decorative thin lines flanking subtitle -->
  <line x1="52"  y1="175" x2="104" y2="175" stroke="#1565C0" stroke-width="0.8" opacity="0.35"/>
  <line x1="156" y1="175" x2="208" y2="175" stroke="#1565C0" stroke-width="0.8" opacity="0.35"/>

  <!-- PET SHOP / GROOMING -->
  <text x="80"  y="185" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700" font-size="9"
        fill="#1565C0" letter-spacing="1.2">PET SHOP</text>
  <text x="180" y="185" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700" font-size="9"
        fill="#1565C0" letter-spacing="1.2">GROOMING</text>
  <!-- Center diamond -->
  <polygon points="130,179 133,183 130,187 127,183" fill="#1565C0" opacity="0.5"/>

  <!-- VETERINARIA -->
  <text x="130" y="212"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="11.5"
        fill="#00838F"
        letter-spacing="3.5">•VETERINARIA•</text>
</svg>
